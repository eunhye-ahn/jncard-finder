spring:
  application:
    name: jncardsearch

  datasource:
    url: jdbc:postgresql://localhost:5432/jncard_finder
    username: root
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  config:
    import: optional:file:.env[.properties]
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
      show_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

  elasticsearch:
    uris: http://localhost:9200
  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      force: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs

jwt:
  secret: ${JWT_SECRET}
  access-expiration: 1800000
  refresh-expiration: 86400000
