spring:
  application:
    name: jncardsearch

  datasource:
    url: jdbc:postgresql://localhost:5432/jncardsearch
    username: root
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
      show_sql: true

  elasticsearch:
    uris: http://localhost:9200
  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8080

